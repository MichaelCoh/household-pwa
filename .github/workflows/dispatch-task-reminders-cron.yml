name: Task Reminder Dispatcher
on:
  schedule:
    - cron: '* * * * *'
  workflow_dispatch:

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Call dispatch-task-reminders Edge Function
        run: |
          HTTP_CODE=$(curl -sS -o /tmp/response.txt -w '%{http_code}' -X POST \
            "${{ secrets.SUPABASE_URL }}/functions/v1/dispatch-task-reminders" \
            -H "Content-Type: application/json" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")
          echo "HTTP Status: $HTTP_CODE"
          BODY=$(cat /tmp/response.txt)
          echo "Response: $BODY"
          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "::error::dispatch-task-reminders returned HTTP $HTTP_CODE — $BODY"
            exit 1
          fi
